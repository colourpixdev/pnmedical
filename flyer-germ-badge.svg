<svg viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kills 99.9% of tested germs badge</title>
  <desc id="desc">Round campaign badge for Sani-Hands efficacy message.</desc>
  <defs>
    <radialGradient id="core" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#2db18f"/>
      <stop offset="100%" stop-color="#0f6b61"/>
    </radialGradient>
  </defs>
  <rect width="360" height="360" fill="none"/>
  <g transform="translate(180,180)">
    <circle r="148" fill="none" stroke="#8ad8cd" stroke-width="14" stroke-dasharray="6 10"/>
    <circle r="120" fill="url(#core)" stroke="#e8fff8" stroke-width="8"/>
    <circle r="92" fill="#0f4f49" opacity="0.55"/>
    <text y="-12" text-anchor="middle" font-size="54" font-family="Barlow, Arial, sans-serif" font-weight="800" fill="#ffffff">99.9%</text>
    <text y="30" text-anchor="middle" font-size="45" font-family="Barlow, Arial, sans-serif" font-weight="800" fill="#ffffff">GERMS</text>
    <text y="-52" text-anchor="middle" font-size="26" font-family="Barlow, Arial, sans-serif" font-weight="700" fill="#d8fff6">KILLS</text>
    <text y="66" text-anchor="middle" font-size="20" font-family="Barlow, Arial, sans-serif" font-weight="700" fill="#d8fff6">OF TESTED</text>
  </g>
</svg>
